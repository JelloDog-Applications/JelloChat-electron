name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v1.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  fdroid-android:
    name: Build F-Droid Android APK
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.ref_type != 'tag' || !(contains(github.ref_name, '-ptb') || contains(github.ref_name, '-PTB') || contains(github.ref_name, '-canary') || contains(github.ref_name, '-CANARY')) }}
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 != '' && secrets.ANDROID_RELEASE_KEY_ALIAS != '' && secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD != '' && secrets.ANDROID_RELEASE_KEY_PASSWORD != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Prepare F-Droid Android project
        run: npm run prepare:fdroid

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build F-Droid release APK
        working-directory: android
        run: ./gradlew assembleFdroidRelease

      - name: Collect release artifacts
        run: |
          mkdir -p dist/release
          cp android/app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk dist/release/JelloDogChat-fdroid-unsigned.apk
          sha256sum dist/release/JelloDogChat-fdroid-unsigned.apk > dist/release/SHA256SUMS.txt

      - name: Decode Android signing keystore
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > dist/release/android-release.jks

      - name: Sign APK
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        env:
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" sign \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --v4-signing-enabled false \
            --ks dist/release/android-release.jks \
            --ks-key-alias "$ANDROID_RELEASE_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_RELEASE_KEY_PASSWORD" \
            --out dist/release/JelloDogChat-fdroid-signed.apk \
            dist/release/JelloDogChat-fdroid-unsigned.apk
          "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify --verbose dist/release/JelloDogChat-fdroid-signed.apk
          sha256sum dist/release/JelloDogChat-fdroid-signed.apk >> dist/release/SHA256SUMS.txt
          rm -f dist/release/android-release.jks

      - name: Upload F-Droid artifacts
        uses: actions/upload-artifact@v6
        with:
          name: jellodog-chat-fdroid-release
          path: dist/release/*
          if-no-files-found: error

  windows-installer:
    name: Build Windows Installer
    runs-on: windows-2025
    if: ${{ github.event_name != 'push' || github.ref_type != 'tag' || !(contains(github.ref_name, '-ptb') || contains(github.ref_name, '-PTB') || contains(github.ref_name, '-canary') || contains(github.ref_name, '-CANARY')) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build:win
        env:
          APP_PUBLIC_URL: https://chat.jellodog.com
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/release | Out-Null
          $installer = Get-ChildItem -Path dist -Filter '*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw 'Windows installer was not produced.'
          }
          Copy-Item -LiteralPath $installer.FullName -Destination dist/release/JelloDogChat-windows-setup.exe -Force
          Get-ChildItem -Path dist -Filter '*.blockmap' | ForEach-Object {
            Copy-Item -LiteralPath $_.FullName -Destination (Join-Path 'dist/release' $_.Name) -Force
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: jellodog-chat-windows-release
          path: dist/release/*
          if-no-files-found: error

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || github.ref_type != 'tag' || !(contains(github.ref_name, '-ptb') || contains(github.ref_name, '-PTB') || contains(github.ref_name, '-canary') || contains(github.ref_name, '-CANARY')) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Install dependencies
        run: npm ci

      - name: Build Electron Linux directory
        run: npm run build:linux:dir
        env:
          APP_PUBLIC_URL: https://chat.jellodog.com
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Flatpak source
        run: npm run flatpak:prepare

      - name: Build Flatpak repository
        run: |
          flatpak-builder \
            --force-clean \
            --repo=dist/flatpak-repo \
            --install-deps-from=flathub \
            dist/flatpak-build \
            flatpak/com.jellodog.chat.yml

      - name: Export Flatpak bundle
        run: |
          mkdir -p dist/release
          flatpak build-bundle \
            dist/flatpak-repo \
            dist/release/JelloDogChat.flatpak \
            com.jellodog.chat

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v6
        with:
          name: jellodog-chat-flatpak-release
          path: dist/release/JelloDogChat.flatpak
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: ${{ github.event_name != 'push' || github.ref_type != 'tag' || !(contains(github.ref_name, '-ptb') || contains(github.ref_name, '-PTB') || contains(github.ref_name, '-canary') || contains(github.ref_name, '-CANARY')) }}
    needs:
      - fdroid-android
      - windows-installer
      - flatpak
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: JelloDog Chat ${{ github.event.inputs.tag_name || github.ref_name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: true
          files: dist/release/*
