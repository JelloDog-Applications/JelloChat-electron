app-id: com.jellochat.app
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: jellochat
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --share=ipc
  - --device=dri
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: jellochat
    buildsystem: simple
    sources:
      - type: dir
        path: ../dist/flatpak-source
    build-commands:
      - install -Dm755 metadata/jellochat-flatpak /app/bin/jellochat
      - mkdir -p /app/jellochat
      - cp -a app/jellochat/. /app/jellochat/
      - install -Dm644 metadata/com.jellochat.app.desktop /app/share/applications/com.jellochat.app.desktop
      - install -Dm644 metadata/com.jellochat.app.metainfo.xml /app/share/metainfo/com.jellochat.app.metainfo.xml
      - install -Dm644 icons/hicolor/256x256/apps/com.jellochat.app.png /app/share/icons/hicolor/256x256/apps/com.jellochat.app.png
      - install -Dm644 icons/hicolor/1024x1024/apps/com.jellochat.app.png /app/share/icons/hicolor/1024x1024/apps/com.jellochat.app.png
