License: AGPL-3.0-or-later
AuthorName: JelloChat
WebSite: https://chat.jellodog.com
SourceCode: https://github.com/JelloDog-Applications/JelloChat-electron
IssueTracker: https://github.com/JelloDog-Applications/JelloChat-electron/issues

AutoName: JelloChat
Summary: Open source chat for servers, friends, DMs, and voice.
Description: |-
    JelloChat is an open source chat system for communities and friends.

    Features:

    * Servers and channels
    * Direct messages
    * Friend requests
    * Voice channels
    * Screen sharing
    * Roles and moderation tools
    * Attachments
    * Admin tools
    * Self-hostable server URL support

    The Android build is prepared for F-Droid distribution without Google Play
    Services, Firebase, or remote CDN JavaScript. JelloChat is licensed under
    AGPL-3.0-or-later.

RepoType: git
Repo: https://github.com/JelloDog-Applications/JelloChat-electron.git

Builds:
  - versionName: 1.1.3
    versionCode: 3
    commit: v1.1.3
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y npm
    init:
      - cd .. && npm ci --omit=dev
      - npm run prepare:fdroid
      - find node_modules -mindepth 1 -maxdepth 1 ! -name '@capacitor' -exec rm -rf {} +
      - find node_modules/@capacitor -mindepth 1 -maxdepth 1 ! -name android -exec rm -rf {} +
    gradle:
      - fdroid

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 1.1.3
CurrentVersionCode: 3
