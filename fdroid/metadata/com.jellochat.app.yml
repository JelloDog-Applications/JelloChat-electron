Builds:
  - versionName: 1.1.3
    versionCode: 3
    commit: v1.1.3
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y npm
    init:
      - cd .. && npm ci --omit=dev
      - npm run prepare:fdroid
      - find node_modules -mindepth 1 -maxdepth 1 ! -name '@capacitor' -exec rm -rf
        {} +
      - find node_modules/@capacitor -mindepth 1 -maxdepth 1 ! -name android -exec
        rm -rf {} +
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk

